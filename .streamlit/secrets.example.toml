# Copy this file to secrets.toml (same folder) and fill in values.
# secrets.toml is gitignored — never commit real credentials.

# -----------------------------------------------------------------------------
# Streamlit Community Cloud (share.streamlit.io)
# Paste into the web UI: Settings → Secrets. Cloud servers cannot read files on your PC.
# Use ONE of the Drive auth options below plus folder URL.
# -----------------------------------------------------------------------------

GOOGLE_DRIVE_FOLDER_URL = "https://drive.google.com/drive/folders/YOUR_FOLDER_ID"

# Paste entire service-account JSON from Google Cloud (triple quotes allow multiline):
# GCP_CREDENTIALS_JSON = '''
# {
#   "type": "service_account",
#   "project_id": "...",
#   ...
# }
# '''

# -----------------------------------------------------------------------------
# Local development (streamlit run app.py)
# Streamlit auto-loads .streamlit/secrets.toml — OR use a path to your JSON file:
# -----------------------------------------------------------------------------

# Option A — point to your machine (rename/copy file to secrets.toml and edit path):
# GCP_CREDENTIALS_PATH = "C:/Users/YOU/Documents/Secret/akshay_kumar_ads.json"

# Option B — same as Cloud: paste GCP_CREDENTIALS_JSON here instead of a path.
